<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daftar Kelas Renang - Bontang Aquatik</title>
  <meta name="description" content="Formulir pendaftaran kelas renang Bontang Aquatik. Pilih kelas Grup A, B, atau C sesuai kebutuhan. Latihan di Kenari Waterpark Bontang & Ekuator Bontang.">
  <meta name="keywords" content="daftar renang bontang, registrasi bontang aquatik, pendaftaran kelas renang, les renang bontang">
  <meta name="robots" content="index, follow">

  <meta property="og:title" content="Daftar Kelas Renang - Bontang Aquatik">
  <meta property="og:description" content="Daftarkan diri Anda di kelas pelatihan renang profesional Bontang Aquatik.">
  <meta property="og:image" content="assets/images/logo.jpeg">

  <link rel="icon" type="image/jpeg" href="assets/images/logo.jpeg">
  <link rel="apple-touch-icon" href="assets/images/logo.jpeg">

  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-container" style="max-width: 720px;">
      <div class="auth-card">
        <div class="auth-header">
          <div class="icon">📝</div>
          <h1>Daftar Kelas Renang</h1>
          <p>Lengkapi data Anda untuk mulai latihan di Bontang Aquatik Swimming Club</p>
        </div>
        <div class="auth-body">

          <!-- Info kelas referensi -->
          <div class="class-info-banner">
            <h4>Info Kelas Tersedia</h4>
            <!-- <p class="text-muted" style="font-size:13px;margin-bottom:12px;">⚠️ Usia minimal pendaftaran: <strong>5 tahun</strong></p> -->
            <div class="class-info-list" id="class-info-list"></div>
          </div>

          <form id="form-registrasi">
            <div class="form-grid-2">
              <div class="form-group">
                <label>Nama Lengkap *</label>
                <input type="text" name="nama_lengkap" class="form-control" required placeholder="Nama lengkap peserta">
              </div>
              <div class="form-group">
                <label>Usia (tahun) *</label>
                <input type="number" name="usia" id="usia" class="form-control" required min="5" max="80" placeholder="Contoh: 8">
                <p class="form-helper">Minimal 5 tahun</p>
              </div>
            </div>

            <div class="form-grid-2">
              <div class="form-group">
                <label>Nama Panggilan *</label>
                <input type="text" name="username" class="form-control" required placeholder="Untuk login nanti" autocomplete="username">
              </div>
              <div class="form-group">
                <label>Nomor WhatsApp *</label>
                <input type="tel" name="nomor_whatsapp" class="form-control" required placeholder="6285751438324">
              </div>
            </div>

            <div class="form-group">
              <label>Password *</label>
              <div class="password-wrap">
                <input type="password" name="password" id="password" class="form-control" required minlength="6" placeholder="Minimal 6 karakter">
                <button type="button" class="password-toggle" id="toggle-password">👁️</button>
              </div>
            </div>

            <hr class="form-divider">
            <h4 class="form-section-title">📚 Pilihan Kelas & Periode</h4>

            <div class="form-group">
              <label>Pilih Kelas *</label>
              <select name="kelas" id="kelas" class="form-control" required></select>
            </div>

            <div class="form-grid-2">
              <div class="form-group">
                <label>Mulai Pelatihan Sejak *</label>
                <input type="date" name="tanggal_mulai" id="tanggal_mulai" class="form-control" required>
                <!-- <p class="form-helper">Default: hari ini</p> -->
              </div>
              <div class="form-group">
                <label>Durasi Pelatihan (bulan) *</label>
                <input type="number" name="durasi" id="durasi" class="form-control" required min="1" max="24" value="1" placeholder="Contoh: 3">
                <!-- <p class="form-helper">Berapa bulan ingin ikut?</p> -->
              </div>
            </div>

            <div class="form-group">
              <label>Pelatihan Berakhir Pada</label>
              <input type="text" id="tanggal_akhir_display" class="form-control" readonly placeholder="Otomatis terisi sesuai durasi">
              <!-- <p class="form-helper">📅 Otomatis dihitung dari tanggal mulai + durasi</p> -->
            </div>

            <button type="submit" class="btn btn-primary btn-block" style="margin-top: 8px;">
              Daftar Sekarang →
            </button>
          </form>
        </div>
        <div class="auth-footer">
          Sudah punya akun? <a href="login.html">Login di sini</a>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/registrasi.js"></script>
</body>
</html>

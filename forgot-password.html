<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#169AC4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bontang Aquatik">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-180.png">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - Bontang Aquatik</title>
  <meta name="description" content="Atur ulang password akun Bontang Aquatik Anda melalui pertanyaan keamanan.">
  <meta name="robots" content="noindex, follow">

  <link rel="icon" type="image/jpeg" href="assets/images/logo.webp">
  <link rel="apple-touch-icon" href="assets/images/logo.webp">

  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/pwa.css">
</head>
<script src="pwa.js" defer></script>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="icon">🔑</div>
          <h1>Lupa Password</h1>
          <p>Verifikasi identitas untuk membuat password baru</p>
        </div>
        <div class="auth-body">

          <!-- STEP 1: Verifikasi identitas -->
          <form id="form-verify" class="fp-step active">
            <div class="form-group">
              <label>Nama / Username</label>
              <input type="text" id="fp-username" class="form-control" required placeholder="Nama panggilan Anda" autocomplete="username">
            </div>
            <div class="form-group">
              <label>Nomor WhatsApp</label>
              <input type="tel" id="fp-wa" class="form-control" required placeholder="08xxxxxxxxxx" inputmode="numeric">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Lanjut</button>
          </form>

          <!-- STEP 2: Jawab pertanyaan keamanan -->
          <form id="form-answer" class="fp-step">
            <div class="form-group">
              <label>Pertanyaan Keamanan</label>
              <select id="fp-question" class="form-control" required></select>
            </div>
            <div class="form-group">
              <label>Jawaban Anda</label>
              <input type="text" id="fp-answer" class="form-control" required placeholder="Jawaban pertanyaan di atas" autocomplete="off">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Verifikasi Jawaban</button>
            <button type="button" id="fp-back-1" class="btn btn-secondary btn-block" style="margin-top:10px;">Kembali</button>
          </form>

          <!-- STEP 3: Password baru -->
          <form id="form-newpass" class="fp-step">
            <div class="form-group">
              <label>Password Baru</label>
              <div class="password-wrap">
                <input type="password" id="fp-pass1" class="form-control" required placeholder="Minimal 6 karakter" autocomplete="new-password">
                <button type="button" class="password-toggle" data-target="fp-pass1">👁️</button>
              </div>
            </div>
            <div class="form-group">
              <label>Konfirmasi Password Baru</label>
              <div class="password-wrap">
                <input type="password" id="fp-pass2" class="form-control" required placeholder="Ulangi password baru" autocomplete="new-password">
                <button type="button" class="password-toggle" data-target="fp-pass2">👁️</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Simpan Password Baru</button>
          </form>

        </div>
        <div class="auth-footer">
          Ingat password Anda? <a href="login.html">Kembali ke Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/forgot-password.js"></script>
</body>
</html>

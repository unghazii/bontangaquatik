<!DOCTYPE html>
<html lang="id">
<head>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#169AC4">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bontang Akuatik">
  <link rel="apple-touch-icon" href="assets/images/logo.webp">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/images/logo.webp">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lupa Password - Bontang Akuatik</title>
  <meta name="description" content="Atur ulang password akun Bontang Akuatik Anda melalui pertanyaan keamanan.">
  <meta name="robots" content="noindex, follow">

  <link rel="icon" type="image/jpeg" href="assets/images/logo.webp">
  <link rel="apple-touch-icon" href="assets/images/logo.webp">

  <link rel="stylesheet" href="assets/css/global.css">
  <link rel="stylesheet" href="assets/css/navbar.css">
  <link rel="stylesheet" href="assets/css/auth.css">
  <link rel="stylesheet" href="assets/css/pwa.css">
  <link rel="stylesheet" href="assets/css/components.css">
</head>

<body>

  <div class="auth-page">
    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="icon">🔑</div>
          <h1>Lupa Password</h1>
          <p>Verifikasi identitas untuk membuat password baru</p>
        </div>
        <div class="auth-body">

          <!-- STEP 1: Verifikasi identitas pemilik akun -->
          <form id="form-verify" class="fp-step active">
            <p class="form-helper" style="margin-bottom:14px;">Untuk keamanan, isi data berikut <strong>persis</strong> seperti saat pendaftaran. Semua wajib diisi.</p>
            <div class="form-group">
              <label>Nama Lengkap *</label>
              <input type="text" id="fp-nama" class="form-control" required placeholder="Nama lengkap sesuai pendaftaran" autocomplete="name">
            </div>
            <div class="form-group">
              <label>Tanggal Lahir *</label>
              <input type="date" id="fp-tgl-lahir" class="form-control" required>
            </div>
            <div class="form-group">
              <label>Nomor WhatsApp *</label>
              <input type="tel" id="fp-wa" class="form-control" required placeholder="628xxxxxxxxxx" inputmode="numeric">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Verifikasi Identitas</button>
          </form>

          <!-- STEP 2: Password baru -->
          <form id="form-newpass" class="fp-step">
            <p class="form-helper" style="margin-bottom:14px;">✓ Identitas terverifikasi. Silakan buat password baru.</p>
            <div class="form-group">
              <label>Password Baru</label>
              <div class="password-wrap">
                <input type="password" id="fp-pass1" class="form-control" required placeholder="Minimal 6 karakter" autocomplete="new-password">
                <button type="button" class="password-toggle" data-password-toggle="fp-pass1"></button>
              </div>
            </div>
            <div class="form-group">
              <label>Konfirmasi Password Baru</label>
              <div class="password-wrap">
                <input type="password" id="fp-pass2" class="form-control" required placeholder="Ulangi password baru" autocomplete="new-password">
                <button type="button" class="password-toggle" data-password-toggle="fp-pass2"></button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Simpan Password Baru</button>
            <button type="button" id="fp-back-1" class="btn btn-secondary btn-block" style="margin-top:10px;">Kembali</button>
          </form>

        </div>
        <div class="auth-footer">
          Ingat password Anda? <a href="login.html">Kembali ke Login</a>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/components/ui.js"></script>
  <script src="assets/js/forgot-password.js"></script>
  <script src="assets/js/pwa.js" defer></script>
</body>
</html>
